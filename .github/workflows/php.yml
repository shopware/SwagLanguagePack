name: PHP
on:
  pull_request:
    paths:
      - '**/*.php'
      - .github/workflows/php.yml
  push:
    paths:
      - '**/*.php'
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  cs:
    if: github.event_name != 'schedule'
    uses: shopware/github-actions/.github/workflows/cs-fixer.yml@main
    with:
      rules: ""

  phpstan:
    uses: shopware/github-actions/.github/workflows/phpstan.yml@main
    with:
      extensionName: ${{ github.event.repository.name }}
      shopwareVersion: trunk

  phpunit:
    uses: shopware/github-actions/.github/workflows/phpunit.yml@main
    with:
      extensionName: ${{ github.event.repository.name }}
      shopwareVersion: trunk
      uploadCoverage: true
    secrets:
      codecovToken: ${{ secrets.CODECOV_TOKEN }}

  notify-slack-on-schedule-failure:
    name: Slack Notify
    runs-on: ubuntu-latest
    needs: [cs, phpstan, phpunit]
    if: >-
      ${{
        always() &&
        github.event_name == 'schedule' &&
        (needs.cs.result == 'failure' || needs.phpstan.result == 'failure' || needs.phpunit.result == 'failure')
      }}
    steps:
      - name: Create Disaster
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PLUGIN_NAME: ${{ github.event.repository.name }}
        run: |
          payload=$(
            jq -n \
              --arg plugin "$PLUGIN_NAME" \
              --arg run_url "$RUN_URL" \
              --arg workflow "${{ github.workflow }}" '
              {
                text: (
                  "*" + $plugin + " scheduled action run failed*\n"
                  + "Workflow: " + $workflow + "\n"
                  + "<" + $run_url + "|This run caused doom>"
                )
              }
            '
          )

          curl -sS -X POST -H 'Content-type: application/json' --data "${payload}" "${SLACK_WEBHOOK_URL}"
